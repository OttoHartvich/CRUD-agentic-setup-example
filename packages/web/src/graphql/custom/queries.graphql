query GetPosts($published: Boolean) {
  posts(published: $published) {
    id
    title
    content
    published
    likeCount
    viewerHasLiked
    author {
      id
      name
    }
    comments {
      id
      body
      author {
        id
        name
      }
      createdAt
    }
    tags {
      id
      name
    }
    createdAt
  }
}

query GetPostWithComments($id: ID!) {
  post(id: $id) {
    id
    title
    content
    published
    likeCount
    viewerHasLiked
    author {
      id
      name
    }
    comments {
      id
      body
      author {
        id
        name
      }
      createdAt
    }
    createdAt
    updatedAt
  }
}

query GetUsers {
  users {
    id
    email
    name
    role
    createdAt
  }
}
